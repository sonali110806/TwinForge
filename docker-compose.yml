services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: twinforge-backend
    ports:
      - "5001:5000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: twinforge-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:5000
    depends_on:
      - backend
    ports:
      - "8080:8080"
    restart: unless-stopped
